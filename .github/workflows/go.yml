name: Buid ECS Helper
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v1

    - name: generate semver tag and release
      id: semver_tag
      uses: ministryofjustice/opg-github-actions/.github/actions/semver-tag@73bfe6f3ea05ffbc3dd278fe29c113ec1e7dcefc # v3.1.1
      with:
        prerelease: true
        default_bump: "minor"

    - name: Set up Go 1.25.0
      uses: actions/setup-go@v1
      with:
        go-version: 1.25.0
      id: go

    - name: Get dependencies
      run: go mod download

    - name: Build Runner
      run: go build -a -installsuffix cgo -o runner ./cmd/runner
